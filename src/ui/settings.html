<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Google Drive Settings</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #111827;
    --muted: #6b7280;
    --border: #e5e7eb;
    --card: #f9fafb;
    --primary: #0f766e;
    --primary-fg: #ffffff;
    --danger: #b91c1c;
    --danger-fg: #ffffff;
    --success: #15803d;
  }
  .dark {
    --bg: #0f172a;
    --fg: #e5e7eb;
    --muted: #94a3b8;
    --border: #1f2937;
    --card: #111827;
    --primary: #14b8a6;
    --primary-fg: #062b28;
    --danger: #f87171;
    --danger-fg: #1c1917;
    --success: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 13px/1.4 ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
    background: var(--bg);
    color: var(--fg);
    padding: 12px;
  }
  .card {
    border: 1px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    padding: 12px;
  }
  h1 { margin: 0 0 4px; font-size: 14px; }
  p { margin: 0 0 10px; color: var(--muted); font-size: 12px; }
  label {
    display: block;
    font-size: 12px;
    margin: 10px 0 4px;
    color: var(--muted);
  }
  input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--fg);
    padding: 8px 10px;
    font-size: 12px;
  }
  input:disabled { opacity: 0.5; }
  .hint { font-size: 11px; color: var(--muted); margin: 4px 0 0; }
  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    flex-wrap: wrap;
  }
  .status {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
    min-height: 16px;
  }
  button {
    border: 0;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    background: var(--primary);
    color: var(--primary-fg);
  }
  button:disabled { opacity: 0.5; cursor: default; }
  .ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--fg);
  }
  .danger-btn {
    background: var(--danger);
    color: var(--danger-fg);
  }
  .error { color: var(--danger); }
  .success { color: var(--success); }
  .auth-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .auth-badge.connected {
    background: rgba(21, 128, 61, 0.1);
    color: var(--success);
  }
  .auth-badge.disconnected {
    background: rgba(107, 114, 128, 0.1);
    color: var(--muted);
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Google Drive Storage</h1>
    <p>Configure Google Drive as a filesystem backend for your workspace.</p>

    <div id="auth-status" class="auth-badge disconnected">Not connected</div>

    <label for="client-id">Client ID</label>
    <input id="client-id" placeholder="your-client-id.apps.googleusercontent.com" />

    <label for="client-secret">Client Secret</label>
    <input id="client-secret" type="password" placeholder="Client secret" />

    <label for="root-folder">Root Folder ID</label>
    <input id="root-folder" value="root" placeholder="root" />
    <div class="hint">Google Drive folder ID to use as root. "root" uses the top-level drive.</div>

    <div class="row" id="actions-disconnected">
      <button id="save-btn" class="ghost">Save</button>
      <button id="signin-btn">Sign in with Google</button>
    </div>

    <div class="row" id="actions-connected" style="display:none">
      <button id="refresh-btn" class="ghost">Refresh Token</button>
      <button id="disconnect-btn" class="danger-btn">Disconnect</button>
    </div>

    <div id="status" class="status"></div>
  </div>

<script>
  const clientIdEl = document.getElementById('client-id');
  const clientSecretEl = document.getElementById('client-secret');
  const rootFolderEl = document.getElementById('root-folder');
  const statusEl = document.getElementById('status');
  const authBadge = document.getElementById('auth-status');
  const actionsDisconnected = document.getElementById('actions-disconnected');
  const actionsConnected = document.getElementById('actions-connected');

  let isAuthenticated = false;
  let requestId = 0;
  const pending = new Map();

  function sendPluginCommand(command, params) {
    return new Promise((resolve, reject) => {
      const id = ++requestId;
      pending.set(id, { resolve, reject });
      parent.postMessage({ type: 'plugin-command', command, params, requestId: id }, '*');
      setTimeout(() => {
        if (pending.has(id)) {
          pending.delete(id);
          resolve({ success: false, error: 'Request timed out' });
        }
      }, 30000);
    });
  }

  function sendHostAction(action) {
    return new Promise((resolve, reject) => {
      const id = ++requestId;
      pending.set(id, { resolve, reject, isHost: true });
      parent.postMessage({ type: 'host-action', action, requestId: id }, '*');
      setTimeout(() => {
        if (pending.has(id)) {
          pending.delete(id);
          reject(new Error('Host action timed out'));
        }
      }, 120000);
    });
  }

  function setStatus(text, type) {
    statusEl.textContent = text || '';
    statusEl.className = 'status' + (type === 'error' ? ' error' : type === 'success' ? ' success' : '');
  }

  function updateAuthUI() {
    if (isAuthenticated) {
      authBadge.textContent = 'Connected';
      authBadge.className = 'auth-badge connected';
      actionsDisconnected.style.display = 'none';
      actionsConnected.style.display = 'flex';
      clientIdEl.disabled = true;
      clientSecretEl.disabled = true;
    } else {
      authBadge.textContent = 'Not connected';
      authBadge.className = 'auth-badge disconnected';
      actionsDisconnected.style.display = 'flex';
      actionsConnected.style.display = 'none';
      clientIdEl.disabled = false;
      clientSecretEl.disabled = false;
    }
  }

  async function loadConfig() {
    const result = await sendPluginCommand('GetConfig', {});
    if (!result || !result.success || !result.data) return;
    const cfg = result.data;
    clientIdEl.value = cfg.client_id || '';
    clientSecretEl.value = cfg.client_secret || '';
    rootFolderEl.value = cfg.root_folder_id || 'root';
    isAuthenticated = !!(cfg.refresh_token && cfg.refresh_token.length > 0);
    updateAuthUI();
  }

  async function saveConfig() {
    setStatus('Saving...', '');
    const result = await sendPluginCommand('SetConfig', {
      access_token: '',
      refresh_token: '',
      client_id: clientIdEl.value.trim(),
      client_secret: clientSecretEl.value.trim(),
      root_folder_id: rootFolderEl.value.trim() || 'root',
    });
    if (result && result.success) {
      setStatus('Configuration saved.', 'success');
    } else {
      setStatus(result?.error || 'Failed to save', 'error');
    }
  }

  async function startOAuth() {
    const clientId = clientIdEl.value.trim();
    const clientSecret = clientSecretEl.value.trim();
    if (!clientId) { setStatus('Client ID is required.', 'error'); return; }
    if (!clientSecret) { setStatus('Client Secret is required.', 'error'); return; }

    // Save config first so the plugin has client_id/secret for token exchange
    await sendPluginCommand('SetConfig', {
      access_token: '',
      refresh_token: '',
      client_id: clientId,
      client_secret: clientSecret,
      root_folder_id: rootFolderEl.value.trim() || 'root',
    });

    const scope = encodeURIComponent('https://www.googleapis.com/auth/drive.file');
    // Use localhost redirect for native (Tauri) apps; host will provide actual redirect_uri
    const redirectPrefix = 'http://localhost/oauth/callback';
    const redirectUri = encodeURIComponent(redirectPrefix);
    const authUrl =
      'https://accounts.google.com/o/oauth2/v2/auth' +
      '?client_id=' + encodeURIComponent(clientId) +
      '&redirect_uri=' + redirectUri +
      '&response_type=code&scope=' + scope +
      '&access_type=offline&prompt=consent';

    setStatus('Opening sign-in window...', '');

    try {
      const result = await sendHostAction({
        type: 'open-oauth',
        payload: { url: authUrl, redirect_uri_prefix: redirectPrefix },
      });

      if (!result || !result.code) {
        setStatus('No authorization code received.', 'error');
        return;
      }

      setStatus('Exchanging authorization code...', '');
      const exchange = await sendPluginCommand('ExchangeToken', {
        code: result.code,
        redirect_uri: result.redirect_uri || redirectPrefix,
      });

      if (exchange && exchange.success) {
        isAuthenticated = true;
        updateAuthUI();
        setStatus('Connected to Google Drive.', 'success');
      } else {
        setStatus(exchange?.error || 'Token exchange failed.', 'error');
      }
    } catch (e) {
      setStatus(e.message || 'OAuth failed.', 'error');
    }
  }

  async function refreshToken() {
    setStatus('Refreshing token...', '');
    const result = await sendPluginCommand('RefreshToken', {});
    if (result && result.success) {
      setStatus('Token refreshed.', 'success');
    } else {
      setStatus(result?.error || 'Refresh failed.', 'error');
    }
  }

  async function disconnect() {
    await sendPluginCommand('SetConfig', {
      access_token: '',
      refresh_token: '',
      client_id: clientIdEl.value.trim(),
      client_secret: clientSecretEl.value.trim(),
      root_folder_id: rootFolderEl.value.trim() || 'root',
    });
    isAuthenticated = false;
    updateAuthUI();
    setStatus('Disconnected from Google Drive.', 'success');
  }

  // Event listeners
  document.getElementById('save-btn').addEventListener('click', saveConfig);
  document.getElementById('signin-btn').addEventListener('click', startOAuth);
  document.getElementById('refresh-btn').addEventListener('click', refreshToken);
  document.getElementById('disconnect-btn').addEventListener('click', disconnect);

  // Message handler
  window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || typeof data !== 'object') return;

    if (data.type === 'plugin-response' && data.requestId) {
      const entry = pending.get(data.requestId);
      if (entry) {
        pending.delete(data.requestId);
        entry.resolve(data.result);
      }
    }

    if (data.type === 'host-action-response' && data.requestId) {
      const entry = pending.get(data.requestId);
      if (entry) {
        pending.delete(data.requestId);
        if (data.success) {
          entry.resolve(data.data);
        } else {
          entry.reject(new Error(data.error || 'Host action failed'));
        }
      }
    }

    if (data.type === 'init') {
      if (data.theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      loadConfig();
    }

    if (data.type === 'theme-update') {
      if (data.theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    }
  });
</script>
</body>
</html>
